syntax = "proto3";
package heltes_db;

// ── Shard service ─────────────────────────────────────────────────────────────
//
// One ShardService instance runs per shard process. The coordinator calls these
// RPCs to drive the Heltes SI protocol on behalf of transactions.

service ShardService {
  rpc Read               (ReadRequest)               returns (ReadReply);
  rpc Update             (UpdateRequest)             returns (UpdateReply);
  rpc Prepare            (PrepareRequest)            returns (PrepareReply);
  rpc Commit             (CommitRequest)             returns (CommitReply);
  rpc Abort              (AbortRequest)              returns (AbortReply);
  // Single-shard fast path: atomically prepare + commit in one round trip.
  rpc FastCommit         (FastCommitRequest)         returns (FastCommitReply);
  // Write-and-fast-commit: single RPC carrying the write payload; shard atomically
  // checks conflicts, installs the write, and commits.  Eliminates the separate
  // Update → FastCommit round trips for single-write single-shard transactions.
  // (ShardHandleWriteAndFastCommit in TLA+)
  rpc WriteAndFastCommit (WriteAndFastCommitRequest) returns (FastCommitReply);
  // Returns the shard's current logical clock.  Used by coordinators at startup
  // to sync c_clock to max(s_clock) across all shards before serving requests,
  // preventing CommittedConflict aborts from clock divergence (CoordSyncClock in TLA+).
  rpc GetClock           (GetClockRequest)           returns (GetClockReply);
}

// ── Coordinator service ───────────────────────────────────────────────────────
//
// One CoordinatorService instance runs per coordinator process.
//
// Client-facing RPCs drive the full transaction lifecycle. The coordinator
// handles all shard routing, Inquire retry loops, and 2PC internally — clients
// never see shards.
//
// Commit blocks until 2PC completes (all shards have installed the version).
//
// Internal RPC: shards call Inquire to resolve prepared-writer visibility.

service CoordinatorService {
  // Client-facing
  rpc Begin            (TxBeginRequest)            returns (TxBeginReply);
  rpc Read             (TxReadRequest)             returns (TxReadReply);
  rpc Update           (TxUpdateRequest)           returns (TxUpdateReply);
  rpc Commit           (TxCommitRequest)           returns (TxCommitReply);
  rpc Abort            (TxAbortRequest)            returns (TxAbortReply);
  // Write-and-commit fast path: single client RPC for single-write single-shard
  // transactions.  The coordinator routes to the owning shard's WriteAndFastCommit
  // RPC, eliminating the separate Update + Commit round trips.
  // (CoordWriteAndFastCommit + ShardHandleWriteAndFastCommit in TLA+)
  rpc WriteAndCommit   (TxWriteAndCommitRequest)   returns (TxWriteAndCommitReply);

  // Internal: shard → coordinator
  rpc Inquire          (InquireRequest)            returns (InquireReply);
}

// ── Shared primitives ─────────────────────────────────────────────────────────

// Reusable unit-variant messages (proto3 bools in oneofs are error-prone).
message Abort  {}
message Active {}

// ── Read ──────────────────────────────────────────────────────────────────────

message ReadRequest {
  uint64                tx_id           = 1;
  uint64                start_ts        = 2;
  uint64                key             = 3;
  // Coordinator-resolved INQUIRE results from a previous NeedsInquiry reply.
  // Empty on the first attempt; populated on retries.
  repeated InquiryResult inquiry_results = 4;
}

// One resolved INQUIRE result supplied by the coordinator.
message InquiryResult {
  uint64 tx_id = 1;
  oneof status {
    uint64 committed_at = 2;  // Committed(ts)
    Active active       = 3;  // Active
  }
}

message ReadReply {
  oneof result {
    uint64          value         = 1;  // Value(v)
    bool            not_found     = 2;  // NotFound  (true = not found)
    Abort           abort         = 3;  // Abort
    NeedsInquirySet needs_inquiry = 4;  // NeedsInquiry(ids)
  }
}

message NeedsInquirySet {
  repeated uint64 tx_ids = 1;
}

// ── Update ────────────────────────────────────────────────────────────────────

message UpdateRequest {
  uint64 tx_id    = 1;
  uint64 start_ts = 2;
  uint64 key      = 3;
  uint64 value    = 4;
}

message UpdateReply {
  oneof result {
    bool  ok    = 1;  // Ok
    Abort abort = 2;  // Abort
  }
}

// ── Prepare ───────────────────────────────────────────────────────────────────

message PrepareRequest {
  uint64 tx_id = 1;
}

message PrepareReply {
  oneof result {
    uint64 timestamp = 1;  // Timestamp(t)
    Abort  abort     = 2;  // Abort
  }
}

// ── FastCommit ────────────────────────────────────────────────────────────────
// Single-shard optimisation: shard atomically prepares + commits, returning
// the shard-clock-assigned commit timestamp (or Abort on conflict).

message FastCommitRequest {
  uint64 tx_id = 1;
}

message FastCommitReply {
  oneof result {
    uint64 commit_ts = 1;  // committed at this shard-assigned timestamp
    Abort  abort     = 2;  // transaction was already aborted at this shard
  }
}

// ── WriteAndFastCommit ────────────────────────────────────────────────────────
// Shard-level: atomically check conflicts, buffer + commit a single write.
// Reuses FastCommitReply (commit_ts on success, Abort on conflict/error).

message WriteAndFastCommitRequest {
  uint64 tx_id    = 1;
  uint64 start_ts = 2;
  uint64 key      = 3;
  uint64 value    = 4;
}

// ── WriteAndCommit (coordinator client-facing) ────────────────────────────────
// Client-facing fast path for single-write single-shard transactions.
// The coordinator routes to the owning shard's WriteAndFastCommit RPC,
// eliminating the separate Update + Commit round trips.
// (CoordWriteAndFastCommit + ShardHandleWriteAndFastCommit in TLA+)

message TxWriteAndCommitRequest {
  uint64 tx_id  = 1;
  uint64 key    = 2;
  uint64 value  = 3;
}

message TxWriteAndCommitReply {
  oneof result {
    uint64 commit_ts = 1;  // committed at this timestamp
    Abort  abort     = 2;  // conflict detected or coordinator-level abort
  }
}

// ── Commit ────────────────────────────────────────────────────────────────────

message CommitRequest {
  uint64 tx_id     = 1;
  uint64 commit_ts = 2;
}

message CommitReply {
  oneof result {
    bool  ok    = 1;  // writes installed successfully
    Abort abort = 2;  // tx was already aborted at this shard (e.g. TTL expiry)
  }
}

// ── Abort ─────────────────────────────────────────────────────────────────────

message AbortRequest {
  uint64 tx_id = 1;
}

message AbortReply {}

// ── GetClock ──────────────────────────────────────────────────────────────────

message GetClockRequest {}

message GetClockReply {
  uint64 clock = 1;
}

// ── Coordinator client-facing messages ───────────────────────────────────────
//
// These differ from the shard-level messages: start_ts and commit_ts are
// managed internally by the coordinator; clients only supply tx_id, key, value.

message TxBeginRequest {}

message TxBeginReply {
  uint64 tx_id    = 1;
  uint64 start_ts = 2;
}

message TxReadRequest {
  uint64 tx_id = 1;
  uint64 key   = 2;
}

message TxReadReply {
  oneof result {
    uint64 value     = 1;  // Value(v)
    bool   not_found = 2;  // NotFound
    Abort  abort     = 3;  // transaction was aborted
  }
}

message TxUpdateRequest {
  uint64 tx_id  = 1;
  uint64 key    = 2;
  uint64 value  = 3;
}

message TxUpdateReply {
  oneof result {
    bool  ok    = 1;
    Abort abort = 2;
  }
}

message TxCommitRequest {
  uint64 tx_id = 1;
}

message TxCommitReply {
  oneof result {
    uint64 commit_ts = 1;  // committed at this timestamp
    Abort  abort     = 2;  // 2PC failed (a shard aborted)
  }
}

message TxAbortRequest {
  uint64 tx_id = 1;
}

message TxAbortReply {}

// ── Inquire ───────────────────────────────────────────────────────────────────

message InquireRequest {
  uint64 tx_id    = 1;
  uint64 prep_ts  = 2;
  // Hop counter for deadlock cycle detection (see CoordHandleInquire in spec).
  // Initialised to 0 by the originating coordinator; incremented on each
  // cross-coordinator forwarding step.  Rejected with deadline_exceeded when
  // hop_count >= MAX_INQUIRY_HOPS, breaking A↔B circular-inquiry cycles.
  uint32 hop_count = 3;
}

message InquireReply {
  oneof status {
    uint64 committed_at = 1;  // Committed(ts)
    Active active       = 2;  // Active
  }
}
