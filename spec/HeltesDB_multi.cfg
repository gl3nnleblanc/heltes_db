SPECIFICATION Spec

CONSTANTS
    t1 = t1
    t2 = t2
    k1 = k1
    v1 = v1
    v2 = v2
    c1 = c1
    c2 = c2
    s1 = s1
    ABORT = ABORT
    NONE = NONE
    TxIds          = {t1, t2}
    Keys           = {k1}
    Values         = {v1, v2}
    Coordinators   = {c1, c2}
    Shards         = {s1}
    CoordOf        <- MC_multi_CoordOf
    ShardOf        <- MC_multi_ShardOf
    MaxTimestamp   = 5
    MaxHops        = 2
    MaxWritesPerTx = 1

INVARIANTS
    TypeInvariant
    MC_MultiInvariant
