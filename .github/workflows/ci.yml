name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: Build, test, lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Build (all targets)
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Throughput regression gate
        # Run a fixed workload and fail if throughput drops >10% or p99 rises >20%
        # vs bench_baseline.json.  Catches catastrophic regressions (e.g. a change
        # that serialises all shard operations or breaks the fast-commit path).
        #
        # To update the baseline after a legitimate performance change:
        #   cargo run --release --bin bench -- \
        #     --shards 2 --workers 8 --duration 5 --warmup 2 \
        #     --save-baseline bench_baseline.json
        # then commit the updated bench_baseline.json.
        run: >
          cargo run --release --bin bench --
          --shards 2 --workers 8 --duration 5 --warmup 2
          --check-baseline bench_baseline.json
